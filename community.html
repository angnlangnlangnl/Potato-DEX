<div id="page-community" class="page-container">
    <style>
        /* 聊天界面容器，撑满可用高度 */
        .chat-wrapper {
            display: flex;
            flex-direction: column;
            height: calc(100vh - 140px); /* 减去顶部header和底部导航高度 */
            max-height: calc(100vh - 140px);
            position: relative;
        }

        /* 消息列表区域，自动滚动 */
        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .empty-chat {
            text-align: center;
            color: #a3adc9;
            font-size: 14px;
            margin-top: 40px;
        }

        /* 底部输入栏 */
        .chat-input-bar {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 10px 14px;
            background: rgba(18,22,40,0.85);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border-top: 1px solid rgba(255,255,255,0.08);
            border-radius: 0 0 16px 16px;
        }

        .plus-btn {
            background: #2d325a;
            border: none;
            color: #ccd6f0;
            width: 36px;
            height: 36px;
            border-radius: 50%;
            font-size: 22px;
            font-weight: bold;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: transform 0.2s;
            flex-shrink: 0;
            line-height: 1;
        }
        .plus-btn:active { transform: scale(0.92); }

        .chat-input-bar input {
            flex: 1;
            background: #0d1125;
            border: 1px solid #2d325a;
            border-radius: 20px;
            padding: 10px 16px;
            color: #fff;
            font-size: 14px;
            outline: none;
            transition: border-color 0.2s;
        }

        .chat-input-bar input:focus {
            border-color: #4ecca3;
        }

        .chat-input-bar input::placeholder {
            color: #6b7394;
        }

        .send-btn {
            background: #f0b90b;
            border: none;
            color: #0b0f1a;
            width: 38px;
            height: 38px;
            border-radius: 50%;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: transform 0.2s;
            flex-shrink: 0;
        }

        .send-btn:active {
            transform: scale(0.92);
        }

        /* 遮罩层 */
        .menu-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            z-index: 2000;
            display: none;
        }

        .menu-overlay.show {
            display: block;
        }

        /* 底部弹出菜单 */
        .menu-panel {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            max-width: 414px;
            left: 50%;
            transform: translateX(-50%) translateY(100%);
            background: rgba(18,22,40,0.95);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-top: 1px solid rgba(255,255,255,0.1);
            border-radius: 20px 20px 0 0;
            padding: 24px 16px 30px;
            z-index: 2001;
            transition: transform 0.3s ease;
        }

        .menu-panel.show {
            transform: translateX(-50%) translateY(0);
        }

        .menu-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
            text-align: center;
        }

        .menu-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
            cursor: pointer;
        }

        .menu-item-icon {
            width: 50px;
            height: 50px;
            background: #2d325a;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
        }

        .menu-item-label {
            font-size: 12px;
            color: #ccd6f0;
        }

        .menu-cancel {
            width: 100%;
            margin-top: 20px;
            padding: 12px;
            background: rgba(255,255,255,0.08);
            border: none;
            border-radius: 12px;
            color: #ccd6f0;
            font-size: 16px;
            cursor: pointer;
        }
    </style>

    <div class="chat-wrapper">
        <div class="chat-messages" id="chatMessages">
            <div class="empty-chat">暂无消息，开始密聊吧</div>
        </div>

        <div class="chat-input-bar">
            <button class="plus-btn" id="plusBtn">+</button>
            <input type="text" id="chatInput" placeholder="输入消息..." autocomplete="off">
            <button class="send-btn" id="sendBtn">➤</button>
        </div>
    </div>

    <!-- 遮罩层 -->
    <div class="menu-overlay" id="menuOverlay"></div>
    <!-- 底部弹出菜单 -->
    <div class="menu-panel" id="menuPanel">
        <div class="menu-grid">
            <div class="menu-item" onclick="handleMenuAction('photo')">
                <div class="menu-item-icon">📷</div>
                <div class="menu-item-label">照片</div>
            </div>
            <div class="menu-item" onclick="handleMenuAction('video')">
                <div class="menu-item-icon">🎬</div>
                <div class="menu-item-label">视频</div>
            </div>
            <div class="menu-item" onclick="handleMenuAction('transfer')">
                <div class="menu-item-icon">💸</div>
                <div class="menu-item-label">转币</div>
            </div>
            <div class="menu-item" onclick="handleMenuAction('file')">
                <div class="menu-item-icon">📁</div>
                <div class="menu-item-label">文件</div>
            </div>
        </div>
        <button class="menu-cancel" id="menuCancelBtn">取消</button>
    </div>

    <script>
    (function() {
        var input = document.getElementById('chatInput');
        var sendBtn = document.getElementById('sendBtn');
        var messagesContainer = document.getElementById('chatMessages');
        var plusBtn = document.getElementById('plusBtn');
        var overlay = document.getElementById('menuOverlay');
        var panel = document.getElementById('menuPanel');
        var cancelBtn = document.getElementById('menuCancelBtn');

        // ========== 消息发送 ==========
        function addMessage(text, isSent) {
            if (!text.trim()) return;
            var msgDiv = document.createElement('div');
            msgDiv.style.display = 'flex';
            msgDiv.style.justifyContent = isSent ? 'flex-end' : 'flex-start';
            msgDiv.innerHTML = 
                '<div style="max-width:70%;padding:10px 14px;border-radius:18px;font-size:14px;word-break:break-word;' +
                (isSent ? 'background:#f0b90b;color:#0b0f1a;' : 'background:#1e2a4a;color:#ccd6f0;') +
                '">' + text + '</div>';
            messagesContainer.appendChild(msgDiv);
            messagesContainer.scrollTop = messagesContainer.scrollHeight;
        }

        function sendMessage() {
            var text = input.value;
            if (!text.trim()) return;
            addMessage(text, true);
            input.value = '';
            // 模拟自动回复
            setTimeout(function() {
                addMessage('收到！(自动回复)', false);
            }, 1000);
        }

        sendBtn.addEventListener('click', sendMessage);
        input.addEventListener('keydown', function(e) {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        });

        // ========== 底部菜单控制 ==========
        function showMenu() {
            overlay.classList.add('show');
            panel.classList.add('show');
        }

        function hideMenu() {
            overlay.classList.remove('show');
            panel.classList.remove('show');
        }

        plusBtn.addEventListener('click', showMenu);
        overlay.addEventListener('click', hideMenu);
        cancelBtn.addEventListener('click', hideMenu);

        // 全局暴露菜单点击处理
        window.handleMenuAction = function(type) {
            hideMenu();
            var actionMap = {
                'photo': '📷 照片功能',
                'video': '🎬 视频功能',
                'transfer': '💸 转币功能',
                'file': '📁 文件功能'
            };
            addMessage(actionMap[type] + ' (暂未开放)', false);
        };

        // 初始聚焦
        setTimeout(function() { input.focus(); }, 300);
    })();
    </script>
</div>
