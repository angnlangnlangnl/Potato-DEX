<div id="page-community" class="page-container">
    <style>
        /* 聊天界面容器，撑满可用高度 */
        .chat-wrapper {
            display: flex;
            flex-direction: column;
            height: calc(100vh - 140px); /* 减去顶部header和底部导航高度 */
            max-height: calc(100vh - 140px);
        }

        /* 消息列表区域，自动滚动 */
        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .empty-chat {
            text-align: center;
            color: #a3adc9;
            font-size: 14px;
            margin-top: 40px;
        }

        /* 底部输入栏 */
        .chat-input-bar {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px 14px;
            background: rgba(18,22,40,0.85);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border-top: 1px solid rgba(255,255,255,0.08);
            border-radius: 0 0 16px 16px;
        }

        .chat-input-bar input {
            flex: 1;
            background: #0d1125;
            border: 1px solid #2d325a;
            border-radius: 20px;
            padding: 10px 16px;
            color: #fff;
            font-size: 14px;
            outline: none;
            transition: border-color 0.2s;
        }

        .chat-input-bar input:focus {
            border-color: #4ecca3;
        }

        .chat-input-bar input::placeholder {
            color: #6b7394;
        }

        .send-btn {
            background: #f0b90b;
            border: none;
            color: #0b0f1a;
            width: 38px;
            height: 38px;
            border-radius: 50%;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: transform 0.2s;
            flex-shrink: 0;
        }

        .send-btn:active {
            transform: scale(0.92);
        }
    </style>

    <div class="chat-wrapper">
        <div class="chat-messages" id="chatMessages">
            <div class="empty-chat">暂无消息，开始密聊吧</div>
        </div>

        <div class="chat-input-bar">
            <input type="text" id="chatInput" placeholder="输入消息..." autocomplete="off">
            <button class="send-btn" id="sendBtn">➤</button>
        </div>
    </div>

    <script>
    (function() {
        var input = document.getElementById('chatInput');
        var sendBtn = document.getElementById('sendBtn');
        var messagesContainer = document.getElementById('chatMessages');

        function addMessage(text, isSent) {
            if (!text.trim()) return;
            var msgDiv = document.createElement('div');
            msgDiv.style.display = 'flex';
            msgDiv.style.justifyContent = isSent ? 'flex-end' : 'flex-start';
            msgDiv.innerHTML = 
                '<div style="max-width:70%;padding:10px 14px;border-radius:18px;font-size:14px;word-break:break-word;' +
                (isSent ? 'background:#f0b90b;color:#0b0f1a;' : 'background:#1e2a4a;color:#ccd6f0;') +
                '">' + text + '</div>';
            messagesContainer.appendChild(msgDiv);
            messagesContainer.scrollTop = messagesContainer.scrollHeight;
        }

        function sendMessage() {
            var text = input.value;
            if (!text.trim()) return;
            addMessage(text, true);
            input.value = '';
            // 模拟自动回复
            setTimeout(function() {
                addMessage('收到！(自动回复)', false);
            }, 1000);
        }

        sendBtn.addEventListener('click', sendMessage);
        input.addEventListener('keydown', function(e) {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        });

        // 初始聚焦
        setTimeout(function() { input.focus(); }, 300);
    })();
    </script>
</div>
