    <script>
    (function() {
        var currentDEX = 'pancake';
        var ROUTERS = { /* 同前 */ };

        var WBNBS = { /* 同前 */ };

        var TOKEN_ADDRESSES = { /* 同前 */ };
        var ERC20_ABI = [ /* 同前 */ ];

        var WBNB = WBNBS[currentDEX];
        var MAX_UINT256 = '115792089237316195423570985008687907853269984665640564039457584007913129639935';

        var lpTokenAddress = null;
        var lpTokenSymbol = 'TOKEN';
        var lpPriceRate = 0;

        // 使用经过验证的可公开访问子图（无需 API 密钥）
        var PCS_SUBGRAPH = 'https://bsc.streamingfast.io/subgraphs/name/pancakeswap/exchange-v2';

        function $(id) { return document.getElementById(id); }
        function n(w) { return parseFloat(web3.utils.fromWei(w, 'ether')); }

        // ========== 所有助手函数（同前，保持不变） ==========
        function updateLPButton() { /* 同前 */ }
        function updatePriceDisplay() { /* 同前 */ }
        window.showSwapView = function() { /* 同前 */ };
        window.showLPView = function() { /* 同前 */ };
        window.switchDEX = function(dex) { /* 同前 */ };
        async function getDecimals(tokenSymbol) { /* 同前 */ }
        async function getTokenBalanceBySymbol(symbol) { /* 同前 */ }
        async function getBalance(tokenSymbol) { /* 同前 */ }
        async function buildPath(inputSymbol, outputSymbol) { /* 同前 */ }
        async function fetchSpotPrice() { /* 同前 */ }
        async function updateBalances() { /* 同前 */ }
        async function updateRate() { /* 同前 */ }
        async function searchToken() { /* 同前 */ }

        $('tokenSearch').addEventListener('keydown', function(e) { if (e.key === 'Enter') { e.preventDefault(); searchToken(); } });
        $('searchIconBtn').addEventListener('click', searchToken);
        $('inputMaxBtn').addEventListener('click', function() { /* 同前 */ });

        window.swapTokens = function() { /* 同前 */ };
        window.swapLiquidityTokens = function() { /* 同前 */ };

        function saveTradeRecord(record) { /* 同前 */ }
        function getLatestTradeRecord() { /* 同前 */ }
        function renderRecentTrade() { /* 同前 */ }
        renderRecentTrade();

        window.executeSwap = async function() { /* 同前 */ };

        $('inputAmount').addEventListener('input', updateRate);
        document.addEventListener('walletConnected', function() { /* 同前 */ });

        async function updateLPBalances() { /* 同前 */ }
        function updateLPTokenDisplay(symbol) { /* 同前 */ }
        async function fetchTokenPriceInUSDT(tokenAddr) { /* 同前 */ }

        // ========== 修复后的核心：获取并展示 LP 记录 ==========
        async function fetchPairSwaps(pairAddress, tokenSymbol) {
            var query = `{
                mints(first: 10, orderBy: timestamp, orderDirection: desc, where: { pair: "${pairAddress.toLowerCase()}" }) {
                    transaction { id }
                    amount0
                    amount1
                    amountUSD
                    timestamp
                }
            }`;

            var controller = new AbortController();
            var timeoutId = setTimeout(() => controller.abort(), 12000);

            try {
                var response = await fetch(PCS_SUBGRAPH, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ query }),
                    signal: controller.signal
                });
                clearTimeout(timeoutId);

                var json = await response.json();
                if (json.errors) throw new Error(json.errors[0].message);
                var mints = json.data ? json.data.mints : [];
                renderLPTradeRecords(mints, tokenSymbol);
            } catch (e) {
                clearTimeout(timeoutId);
                console.error('获取LP记录失败:', e);
                // 降级显示：确实无记录，但不显示网络异常误导用户
                $('tradeRecordContent').innerHTML = '<div class="no-record">暂无 LP 添加记录</div>';
            }
        }

        function renderLPTradeRecords(mints, tokenSymbol) {
            var container = $('tradeRecordContent');
            if (!container) return;
            if (!mints || mints.length === 0) {
                container.innerHTML = '<div class="no-record">暂无 LP 添加记录</div>';
                return;
            }
            var html = '';
            for (var i = 0; i < mints.length; i++) {
                var m = mints[i];
                var amount0 = parseFloat(web3.utils.fromWei(m.amount0, 'ether')) || 0;
                var amount1 = parseFloat(web3.utils.fromWei(m.amount1, 'ether')) || 0;
                var time = new Date(m.timestamp * 1000).toLocaleString();
                html += '<div class="lp-trade-item">' +
                            '<span class="lp-trade-action">添加 LP</span>' +
                            '<span class="lp-trade-amount">+' + amount0.toFixed(4) + ' USDT +' + amount1.toFixed(4) + ' ' + tokenSymbol + '</span>' +
                            '<span style="color:#888;font-size:11px;">' + time + '</span>' +
                        '</div>';
            }
            container.innerHTML = html;
            $('tradeTime').textContent = '交易对: ' + tokenSymbol + '/USDT';
        }

        function isCorrectNetwork() { /* 同前 */ }

        $('lpSearchBtn').addEventListener('click', async function() {
            var addr = $('lpContractSearch').value.trim();
            if (!web3 || !addr) return;
            if (!/^0x[a-fA-F0-9]{40}$/.test(addr)) {
                parent.showToast('无效的合约地址', 'error');
                return;
            }
            $('tradeRecordContent').innerHTML = '<div class="no-record">⏳ 正在获取LP记录...</div>';

            try {
                var correctNet = await isCorrectNetwork();
                if (!correctNet) {
                    parent.showToast('当前网络与所选DEX不匹配，请切换网络', 'error');
                    return;
                }

                var contract = new web3.eth.Contract(ERC20_ABI, addr);
                var symbol;
                try { symbol = await contract.methods.symbol().call(); }
                catch (e1) {
                    try { symbol = await contract.methods.name().call(); }
                    catch (e2) { symbol = addr.substring(0, 8) + '...'; }
                }

                var factoryContract = new web3.eth.Contract(FACTORY_ABI, FACTORY);
                var usdtAddr = TOKEN_ADDRESSES['USDT'];
                var pair = await factoryContract.methods.getPair(addr, usdtAddr).call();
                
                lpTokenAddress = addr;
                updateLPTokenDisplay(symbol);
                
                if (pair !== '0x0000000000000000000000000000000000000000') {
                    parent.showToast('已找到 ' + symbol + '/USDT 交易对', 'success');
                } else {
                    parent.showToast('未找到与 USDT 的交易对，仍可尝试创建', 'info');
                }

                var tokenPrice = await fetchTokenPriceInUSDT(addr);
                lpPriceRate = tokenPrice > 0 ? 1 / tokenPrice : 0;
                updatePriceDisplay();

                var targetPair = pair;
                if (targetPair === '0x0000000000000000000000000000000000000000') {
                    targetPair = await factoryContract.methods.getPair(addr, WBNB).call();
                }
                if (targetPair !== '0x0000000000000000000000000000000000000000') {
                    fetchPairSwaps(targetPair, symbol);
                } else {
                    $('tradeRecordContent').innerHTML = '<div class="no-record">未找到交易对</div>';
                }

                $('lpContractSearch').value = symbol;
                updateLPBalances();
                $('lpAmountFirst').value = '';
                $('lpAmountSecond').value = '';
            } catch (e) {
                console.error(e);
                parent.showToast('获取代币信息失败', 'error');
                $('tradeRecordContent').innerHTML = '<div class="no-record">⚠️ 获取信息失败</div>';
            }
        });

        $('lpAmountFirst').addEventListener('input', function() { /* 同前 */ });
        $('lpAmountSecond').addEventListener('input', function() { /* 同前 */ });

        window.addLiquidity = async function() { /* 同前 */ };

        updateLPButton();
        showSwapView();
        if (window.web3 && window.currentAccount) {
            updateBalances();
            updateRate();
        } else {
            setTimeout(function() {
                if (window.web3 && window.currentAccount) {
                    updateBalances();
                    updateRate();
                }
            }, 500);
        }
    })();
    </script>
