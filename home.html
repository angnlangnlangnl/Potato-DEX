<div id="page-trade" class="page-container">
    <style>
        .glass-card { background: rgba(18,22,40,0.7); backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px); border: 1px solid rgba(255,255,255,0.1); border-radius: 16px; padding: 20px; margin-bottom: 15px; color: #ccd6f0; overflow: hidden; }

        .dex-btn { flex: 1; padding: 10px 0; font-size: 14px; font-weight: 600; background: #0d1125; color: #a3adc9; border: none; cursor: pointer; transition: background 0.2s, color 0.2s; text-align: center; display: flex; align-items: center; justify-content: center; gap: 4px; }

        .dex-slogan { text-align: center; font-size: 12px; color: #888; padding: 10px 0 12px 0; margin: 0 -20px; }
        .search-wrapper { position: relative; margin-bottom: 14px; }
        .token-search { width: 100%; padding: 10px 40px 10px 14px; background: #0d1125; border: 1px solid #2d325a; border-radius: 12px; color: #fff; font-size: 14px; outline: none; transition: border-color 0.2s; }
        .token-search::placeholder { color: #6b7394; }
        .token-search:focus { border-color: #4ecca3; }
        .search-icon { position: absolute; right: 12px; top: 50%; transform: translateY(-50%); background: none; border: none; color: #6b7394; cursor: pointer; font-size: 18px; padding: 4px; display: flex; align-items: center; justify-content: center; }
        .search-icon:active { color: #4ecca3; }
        .input-row { background: #0d1125; border: 1px solid #2d325a; border-radius: 16px; padding: 12px 15px; margin-bottom: 8px; display: flex; justify-content: space-between; align-items: center; }
        .input-row input { background: transparent; border: none; color: #fff; font-size: 20px; width: 60%; outline: none; -moz-appearance: textfield; }
        .input-row input::-webkit-outer-spin-button, .input-row input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
        .input-row .input-with-plus { display: flex; align-items: center; flex: 1; }
        .input-row .input-with-plus span { color: #fff; font-size: 20px; margin-right: 4px; }

        .token-select { background: #2d325a; border: none; color: #fff; padding: 8px 14px; border-radius: 20px; font-size: 14px; cursor: pointer; display: flex; align-items: center; gap: 6px; }
        .balance-row { text-align: right; font-size: 12px; color: #888; padding: 0 10px; margin-bottom: 8px; }
        .max-btn { color: #f0b90b; cursor: pointer; margin-left: 4px; text-decoration: none; font-weight: 500; }
        .swap-arrow { width: 40px; height: 40px; background: #1e2a4a; border: 2px solid #2d325a; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: -10px auto; position: relative; z-index: 2; cursor: pointer; color: #f0b90b; font-size: 18px; }
        .swap-btn { width: 100%; padding: 14px; border: none; border-radius: 16px; font-size: 16px; font-weight: bold; cursor: pointer; margin-top: 15px; transition: 0.3s; background: #f0b90b; color: #0b0f1a; }
        .swap-btn:disabled { background: #2d325a; color: #666; cursor: not-allowed; }
        .price-info { font-size: 13px; color: #888; text-align: center; margin-top: 12px; }
        .slippage { display: flex; justify-content: flex-end; margin-bottom: 10px; font-size: 12px; color: #888; }
        .lp-input-row { margin-bottom: 10px; }
        .lp-label-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 4px; }
        .lp-label-row .lp-label { margin-bottom: 0; color: #888; font-size: 12px; }
        .lp-label-row .balance-row { text-align: right; padding: 0; margin-bottom: 0; }
        .price-display-row { display: flex; align-items: center; background: #0d1125; border: 1px solid #2d325a; border-radius: 12px; padding: 10px 14px; color: #fff; font-size: 14px; }
        .price-display-row .price-eq { margin: 0 8px; color: #4ecca3; font-weight: 500; }
        .hide { display: none !important; }
        .recent-trade-card { margin-top: 0; }
        .trade-record-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
        .trade-record-title { font-size: 16px; font-weight: bold; color: #f0b90b; }
        .trade-record-time { font-size: 12px; color: #888; }
        .trade-record-content { display: flex; flex-direction: column; gap: 8px; }
        .trade-record-row { display: flex; justify-content: space-between; font-size: 14px; }
        .trade-record-label { color: #888; }
        .trade-record-value { color: #ccd6f0; }
        .tx-hash { color: #4ecca3; font-size: 12px; text-decoration: none; word-break: break-all; }
        .tx-hash:hover { text-decoration: underline; }
        .no-record { text-align: center; color: #888; font-size: 14px; padding: 10px 0; }
        .lp-trade-item { display: flex; justify-content: space-between; padding: 6px 0; border-bottom: 1px solid rgba(255,255,255,0.05); font-size: 12px; }
        .lp-trade-item:last-child { border-bottom: none; }
        .lp-trade-action { color: #4ecca3; }
        .lp-trade-amount { color: #ccd6f0; }
    </style>

                    <path d="M 32 70 C 38 78, 62 78, 68 70 C 60 74, 40 74, 32 70 Z" fill="#F6D68A"/>

                <input type="text" class="token-search" id="lpContractSearch" placeholder="输入代币合约地址搜索">

                <div class="lp-label-row">
                    <span class="lp-label">当前价格 (1 USDT = ? TOKEN)</span>

    <div class="glass-card recent-trade-card" id="recentTradeCard">
        <div class="trade-record-header">
            <span class="trade-record-title">📋 最近交易</span>
            <span class="trade-record-time" id="tradeTime">--</span>

        <div class="trade-record-content" id="tradeRecordContent">
            <div class="no-record">暂无交易记录</div>
        </div>
    </div>

    <script>
    (function() {
        var currentDEX = 'pancake';
        var ROUTERS = {
            pancake: '0x10ED43C718714eb63d5aA57B78B54704E256024E',
            uni: '0x7a250d5630B4cF539739dF2C5dAcb4c659F2488D'
        };
        var FACTORIES = {
            pancake: '0xcA143Ce32Fe78f1f7019d7d551a6402fC5350c73',
            uni: '0x5C69bEe701ef814a2B6a3EDD4B1652CB9cc5aA6f'
        };
        var WBNBS = {
            pancake: '0xbb4CdB9CBd36B01bD1cBaEBF2De08d9173bc095c',
            uni: '0xC02aaA39b223FE8D0A0e5C4F27eAD9083C756Cc2'
        };

        var TOKEN_ADDRESSES = {
            'USDT': '0x55d398326f99059fF775485246999027B3197955',
            'MYK': '0xc23CfEeC6D188D627C85106f682D9eb38d94192a',
            'BNB': null,
            'BUSD': '0xe9e7CEA3DedcA5984780Bafc599bD69ADd087D56',
            'WBNB': '0xbb4CdB9CBd36B01bD1cBaEBF2De08d9173bc095c',
            'CAKE': '0x0E09FaBB73Bd3Ade0a17ECC321fD13a19e81cE82',
            'ETH': '0x2170Ed0880ac9A755fd29B2688956BD959F933F8',
            'BTCB': '0x7130d2A12B9BCbFAe4f2634d864A1Ee1Ce3Ead9c'
        };
        var ERC20_ABI = [
            {"constant":true,"inputs":[{"name":"_owner","type":"address"}],"name":"balanceOf","outputs":[{"name":"balance","type":"uint256"}],"type":"function"},
            {"constant":false,"inputs":[{"name":"_spender","type":"address"},{"name":"_value","type":"uint256"}],"name":"approve","outputs":[{"name":"success","type":"bool"}],"type":"function"},
            {"constant":true,"inputs":[],"name":"decimals","outputs":[{"name":"","type":"uint8"}],"type":"function"},
            {"constant":true,"inputs":[],"name":"symbol","outputs":[{"name":"","type":"string"}],"type":"function"},
            {"constant":true,"inputs":[{"name":"_owner","type":"address"},{"name":"_spender","type":"address"}],"name":"allowance","outputs":[{"name":"","type":"uint256"}],"type":"function"}
        ];
        var ROUTER_ABI = [
            {"constant":false,"inputs":[{"internalType":"uint256","name":"amountIn","type":"uint256"},{"internalType":"uint256","name":"amountOutMin","type":"uint256"},{"internalType":"address[]","name":"path","type":"address[]"},{"internalType":"address","name":"to","type":"address"},{"internalType":"uint256","name":"deadline","type":"uint256"}],"name":"swapExactTokensForTokens","outputs":[{"internalType":"uint256[]","name":"amounts","type":"uint256[]"}],"type":"function"},
            {"constant":false,"inputs":[{"internalType":"uint256","name":"amountOutMin","type":"uint256"},{"internalType":"address[]","name":"path","type":"address[]"},{"internalType":"address","name":"to","type":"address"},{"internalType":"uint256","name":"deadline","type":"uint256"}],"name":"swapExactETHForTokens","outputs":[{"internalType":"uint256[]","name":"amounts","type":"uint256[]"}],"type":"function"},
            {"constant":false,"inputs":[{"internalType":"uint256","name":"amountIn","type":"uint256"},{"internalType":"uint256","name":"amountOutMin","type":"uint256"},{"internalType":"address[]","name":"path","type":"address[]"},{"internalType":"address","name":"to","type":"address"},{"internalType":"uint256","name":"deadline","type":"uint256"}],"name":"swapExactTokensForETH","outputs":[{"internalType":"uint256[]","name":"amounts","type":"uint256[]"}],"type":"function"},
            {"constant":false,"inputs":[{"internalType":"address","name":"tokenA","type":"address"},{"internalType":"address","name":"tokenB","type":"address"},{"internalType":"uint256","name":"amountADesired","type":"uint256"},{"internalType":"uint256","name":"amountBDesired","type":"uint256"},{"internalType":"uint256","name":"amountAMin","type":"uint256"},{"internalType":"uint256","name":"amountBMin","type":"uint256"},{"internalType":"address","name":"to","type":"address"},{"internalType":"uint256","name":"deadline","type":"uint256"}],"name":"addLiquidity","outputs":[{"internalType":"uint256","name":"amountA","type":"uint256"},{"internalType":"uint256","name":"amountB","type":"uint256"},{"internalType":"uint256","name":"liquidity","type":"uint256"}],"type":"function"},
            {"constant":true,"inputs":[{"internalType":"uint256","name":"amountIn","type":"uint256"},{"internalType":"address[]","name":"path","type":"address[]"}],"name":"getAmountsOut","outputs":[{"internalType":"uint256[]","name":"amounts","type":"uint256[]"}],"type":"function"}
        ];
        var FACTORY_ABI = [{"constant":true,"inputs":[{"name":"","type":"address"},{"name":"","type":"address"}],"name":"getPair","outputs":[{"name":"","type":"address"}],"type":"function"}];

        var currentInputToken = 'USDT';
        var currentOutputToken = 'BNB';
        var ROUTER = ROUTERS[currentDEX];
        var FACTORY = FACTORIES[currentDEX];
        var WBNB = WBNBS[currentDEX];
        var MAX_UINT256 = '115792089237316195423570985008687907853269984665640564039457584007913129639935';

        var lpTokenAddress = null;
        var lpTokenSymbol = 'TOKEN';
        var lpPriceRate = 0;

        // 多个子图端点（优先国内可访问节点）
        var SUBGRAPH_URLS = [
            'https://bsc.streamingfast.io/subgraphs/name/pancakeswap/exchange-v2',
            'https://api.thegraph.com/subgraphs/name/pancakeswap/exchange-v2'
        ];

        function $(id) { return document.getElementById(id); }
        function n(w) { return parseFloat(web3.utils.fromWei(w, 'ether')); }

        function updateLPButton() {
            var btn = $('lpAddBtn');
            if (btn) btn.textContent = '添加 ' + (currentDEX === 'pancake' ? 'PancakeSwap' : 'Uniswap') + ' V2 LP';
        }

        function updatePriceDisplay() {
            var display = $('lpPriceDisplay');
            if (!display) return;
            display.innerHTML = lpPriceRate > 0 
                ? '1 USDT = <span class="price-eq">' + lpPriceRate.toFixed(6) + '</span> ' + lpTokenSymbol
                : '1 USDT = <span class="price-eq">--</span> ' + lpTokenSymbol;
        }

        window.showSwapView = function() {
            document.getElementById('swapView').classList.remove('hide');
            document.getElementById('lpView').classList.add('hide');
            document.getElementById('tabSwap').classList.add('active');
            document.getElementById('tabLP').classList.remove('active');
            updateBalances(); updateRate(); renderRecentTrade();
        };
        window.showLPView = function() {
            document.getElementById('swapView').classList.add('hide');
            document.getElementById('lpView').classList.remove('hide');
            document.getElementById('tabSwap').classList.remove('active');
            document.getElementById('tabLP').classList.add('active');
            updateLPButton(); updateLPBalances(); updatePriceDisplay();
        };

        window.switchDEX = function(dex) {
            currentDEX = dex;
            ROUTER = ROUTERS[dex]; FACTORY = FACTORIES[dex]; WBNB = WBNBS[dex];
            document.getElementById('pancakeBtn').classList.toggle('active', dex === 'pancake');
            document.getElementById('uniBtn').classList.toggle('active', dex === 'uni');
            updateLPButton();
            if (!document.getElementById('swapView').classList.contains('hide')) { updateBalances(); updateRate(); }
            parent.showToast('已切换到 ' + (dex === 'pancake' ? 'PancakeSwap' : 'Uniswap'), 'success');
        };

        async function getDecimals(symbol) {
            if (symbol === 'BNB') return 18;
            var addr = TOKEN_ADDRESSES[symbol]; if (!addr) return 18;
            var contract = new web3.eth.Contract(ERC20_ABI, addr);
            return await contract.methods.decimals().call();
        }

        async function getTokenBalanceBySymbol(symbol) {
            if (!window.web3 || !window.currentAccount) return 0;
            if (symbol === 'BNB') return n(await web3.eth.getBalance(window.currentAccount));
            var addr = TOKEN_ADDRESSES[symbol]; if (!addr) return 0;
            var contract = new web3.eth.Contract(ERC20_ABI, addr);
            var decimals = await contract.methods.decimals().call();
            var bal = await contract.methods.balanceOf(window.currentAccount).call();
            return parseFloat(web3.utils.fromWei(bal, 'ether')) / Math.pow(10, 18 - decimals);
        }

        async function getBalance(s) { return getTokenBalanceBySymbol(s); }

        async function buildPath(inSym, outSym) {
            var inAddr = inSym === 'BNB' ? WBNB : TOKEN_ADDRESSES[inSym];
            var outAddr = outSym === 'BNB' ? WBNB : TOKEN_ADDRESSES[outSym];
            if (!inAddr || !outAddr) return null;
            if (inAddr === outAddr) return [inAddr];
            try {
                var rc = new web3.eth.Contract(ROUTER_ABI, ROUTER);
                await rc.methods.getAmountsOut(web3.utils.toWei('1','ether'), [inAddr, outAddr]).call();
                return [inAddr, outAddr];
            } catch(e) {
                try {
                    await rc.methods.getAmountsOut(web3.utils.toWei('1','ether'), [inAddr, WBNB, outAddr]).call();
                    return [inAddr, WBNB, outAddr];
                } catch(e2) {
                    try {
                        await rc.methods.getAmountsOut(web3.utils.toWei('1','ether'), [inAddr, TOKEN_ADDRESSES['USDT'], outAddr]).call();
                        return [inAddr, TOKEN_ADDRESSES['USDT'], outAddr];
                    } catch(e3) { return null; }
                }
            }
        }

        async function fetchSpotPrice() {
            if (!web3) return 0;
            try {
                var path = await buildPath(currentInputToken, currentOutputToken);
                if (!path) return 0;
                var rc = new web3.eth.Contract(ROUTER_ABI, ROUTER);
                var decimals = await getDecimals(currentInputToken);
                var oneUnit = decimals === 18 ? web3.utils.toWei('1','ether') : BigInt(10**decimals).toString();
                var amounts = await rc.methods.getAmountsOut(oneUnit, path).call();
                var outDec = await getDecimals(currentOutputToken);
                return parseFloat(web3.utils.fromWei(amounts[amounts.length-1], 'ether')) / Math.pow(10, 18 - outDec);
            } catch(e) { return 0; }
        }

        async function updateBalances() {
            $('inputBalance').textContent = (await getBalance(currentInputToken)).toFixed(4);
            $('outputBalance').textContent = (await getBalance(currentOutputToken)).toFixed(4);
        }

        async function updateRate() {
            var price = await fetchSpotPrice();
            $('rateInfo').textContent = price > 0 ? '1 ' + currentInputToken + ' ≈ ' + price.toFixed(6) + ' ' + currentOutputToken : '无法获取价格';
            var inputAmt = parseFloat($('inputAmount').value) || 0;
            if (inputAmt > 0 && price > 0) $('outputAmount').value = (inputAmt * price * 0.995).toFixed(6);
            else $('outputAmount').value = '0.0';
            var btn = $('swapButton');
            btn.disabled = !window.currentAccount || inputAmt <= 0;
            btn.textContent = !window.currentAccount ? '连接钱包' : (inputAmt <= 0 ? '输入金额' : '兑换');
        }

        async function searchToken() { /* 保持不变 */ }

        $('tokenSearch').addEventListener('keydown', function(e) { if (e.key === 'Enter') { e.preventDefault(); searchToken(); } });
        $('searchIconBtn').addEventListener('click', searchToken);
        $('inputMaxBtn').addEventListener('click', function() {
            var bal = parseFloat($('inputBalance').textContent) || 0;
            if (bal > 0) { $('inputAmount').value = bal; updateRate(); }
        });

        window.swapTokens = function() {
            var temp = currentInputToken;
            currentInputToken = currentOutputToken; currentOutputToken = temp;
            $('inputTokenBtn').textContent = currentInputToken + ' ▼';
            $('outputTokenBtn').textContent = currentOutputToken + ' ▼';
            $('inputAmount').value = ''; $('outputAmount').value = '0.0';
            updateBalances(); updateRate();
        };

        window.swapLiquidityTokens = function() {
            var a = $('lpAmountFirst').value, b = $('lpAmountSecond').value;
            $('lpAmountFirst').value = b; $('lpAmountSecond').value = a;
            var bal1 = $('lpBalanceFirst').textContent, bal2 = $('lpBalanceSecond').textContent;
            $('lpBalanceFirst').textContent = bal2; $('lpBalanceSecond').textContent = bal1;
            var lab1 = $('lpLabelFirst').textContent, lab2 = $('lpLabelSecond').textContent;
            $('lpLabelFirst').textContent = lab2; $('lpLabelSecond').textContent = lab1;
            var btn1 = $('lpTokenBtnFirst').textContent, btn2 = $('lpTokenBtnSecond').textContent;
            $('lpTokenBtnFirst').textContent = btn2; $('lpTokenBtnSecond').textContent = btn1;
        };

        function saveTradeRecord(r) {
            try {
                var recs = JSON.parse(localStorage.getItem('potato_recent_trades') || '[]');
                recs.unshift(r); if (recs.length > 5) recs = recs.slice(0,5);
                localStorage.setItem('potato_recent_trades', JSON.stringify(recs));
            } catch(e) {}
        }

        function getLatestTradeRecord() {
            try { return (JSON.parse(localStorage.getItem('potato_recent_trades') || '[]'))[0] || null; } catch(e) { return null; }
        }

        function renderRecentTrade() {
            var rec = getLatestTradeRecord();
            var content = $('tradeRecordContent'), timeEl = $('tradeTime');
            if (!rec) {
                content.innerHTML = '<div class="no-record">暂无交易记录</div>';
                timeEl.textContent = '--';
                return;
            }
            timeEl.textContent = rec.time;
            var txLink = rec.txHash ? '<div class="trade-record-row"><span class="trade-record-label">交易哈希</span><a class="tx-hash" href="https://bscscan.com/tx/' + rec.txHash + '" target="_blank">' + rec.txHash.substring(0,10) + '...' + rec.txHash.substring(rec.txHash.length-8) + '</a></div>' : '';
            content.innerHTML = '<div class="trade-record-row"><span class="trade-record-label">交易对</span><span class="trade-record-value">' + rec.inputToken + ' → ' + rec.outputToken + '</span></div>' +
                '<div class="trade-record-row"><span class="trade-record-label">输入</span><span class="trade-record-value">' + rec.inputAmount + ' ' + rec.inputToken + '</span></div>' +
                '<div class="trade-record-row"><span class="trade-record-label">输出</span><span class="trade-record-value">' + rec.outputAmount + ' ' + rec.outputToken + '</span></div>' + txLink;
        }

        renderRecentTrade();

        window.executeSwap = async function() { /* 保持不变 */ };
        $('inputAmount').addEventListener('input', updateRate);
        document.addEventListener('walletConnected', function() { updateBalances(); updateRate(); renderRecentTrade(); updateLPBalances(); });

        async function updateLPBalances() {
            $('lpBalanceFirst').textContent = (await getTokenBalanceBySymbol('USDT')).toFixed(4);
            if (lpTokenAddress) {
                try {
                    var tc = new web3.eth.Contract(ERC20_ABI, lpTokenAddress);
                    var dec = await tc.methods.decimals().call();
                    var bal = await tc.methods.balanceOf(window.currentAccount).call();
                    $('lpBalanceSecond').textContent = (parseFloat(web3.utils.fromWei(bal, 'ether')) / Math.pow(10, 18 - dec)).toFixed(4);
                } catch(e) { $('lpBalanceSecond').textContent = '0.00'; }
            } else $('lpBalanceSecond').textContent = '0.00';
        }

        function updateLPTokenDisplay(sym) {
            lpTokenSymbol = sym || 'TOKEN';
            $('lpTokenBtnSecond').textContent = lpTokenSymbol;
            updatePriceDisplay();
        }

        async function fetchTokenPriceInUSDT(addr) {
            var usdt = TOKEN_ADDRESSES['USDT'], rc = new web3.eth.Contract(ROUTER_ABI, ROUTER);
            try {
                var dec = await new web3.eth.Contract(ERC20_ABI, addr).methods.decimals().call();
                var one = dec === 18 ? web3.utils.toWei('1','ether') : BigInt(10**dec).toString();
                return parseFloat(web3.utils.fromWei((await rc.methods.getAmountsOut(one, [addr, usdt]).call())[1], 'ether'));
            } catch(e) {
                try {
                    var dec2 = await new web3.eth.Contract(ERC20_ABI, addr).methods.decimals().call();
                    var one2 = dec2 === 18 ? web3.utils.toWei('1','ether') : BigInt(10**dec2).toString();
                    return parseFloat(web3.utils.fromWei((await rc.methods.getAmountsOut(one2, [addr, WBNB, usdt]).call())[2], 'ether'));
                } catch(e2) { return 0; }
            }
        }

        // ========== 网络自动切换 ==========
        async function ensureCorrectNetwork() {
            if (!window.ethereum) return false;
            var expectedChainId = currentDEX === 'pancake' ? '0x38' : '0x1';
            try {
                var currentChainId = await window.ethereum.request({ method: 'eth_chainId' });
                if (currentChainId === expectedChainId) return true;
                
                try {
                    await window.ethereum.request({
                        method: 'wallet_switchEthereumChain',
                        params: [{ chainId: expectedChainId }]
                    });
                    return true;
                } catch (switchError) {
                    if (switchError.code === 4902) {
                        var networkParams = currentDEX === 'pancake' ? {
                            chainId: '0x38',
                            chainName: 'BNB Smart Chain',
                            nativeCurrency: { name: 'BNB', symbol: 'BNB', decimals: 18 },
                            rpcUrls: ['https://bsc-dataseed.binance.org/'],
                            blockExplorerUrls: ['https://bscscan.com/']
                        } : {
                            chainId: '0x1',
                            chainName: 'Ethereum Mainnet',
                            nativeCurrency: { name: 'ETH', symbol: 'ETH', decimals: 18 },
                            rpcUrls: ['https://mainnet.infura.io/v3/'],
                            blockExplorerUrls: ['https://etherscan.io/']
                        };
                        await window.ethereum.request({
                            method: 'wallet_addEthereumChain',
                            params: [networkParams]
                        });
                        return true;
                    }
                    throw switchError;
                }
            } catch (e) {
                parent.showToast('网络切换失败: ' + (e.message || '用户拒绝'), 'error');
                return false;
            }
        }

        // ========== 多端点子图查询（mints优先，fallback swaps） ==========
        async function subgraphQuery(query) {
            for (var i = 0; i < SUBGRAPH_URLS.length; i++) {
                var url = SUBGRAPH_URLS[i];
                try {
                    var ctrl = new AbortController();
                    var timer = setTimeout(function() { ctrl.abort(); }, 8000);
                    var resp = await fetch(url, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ query: query }),
                        signal: ctrl.signal
                    });
                    clearTimeout(timer);
                    var json = await resp.json();
                    if (json.errors) throw new Error(json.errors[0].message);
                    return json.data;
                } catch(e) {
                    console.warn('子图端点 ' + url + ' 请求失败: ' + e.message);
                }
            }
            throw new Error('所有子图端点均不可用');
        }

        async function fetchPairEvents(pairAddress, tokenSymbol) {
            var container = $('tradeRecordContent');
            if (!container) return;
            container.innerHTML = '<div class="no-record">⏳ 正在获取记录...</div>';

            var lowerPair = pairAddress.toLowerCase();
            var mints = null;
            // 尝试 mints
            try {
                var mintsQuery = `{ mints(first: 10, orderBy: timestamp, orderDirection: desc, where: { pair: "${lowerPair}" }) { transaction { id } amount0 amount1 amountUSD timestamp } }`;
                var data = await subgraphQuery(mintsQuery);
                if (data && data.mints) mints = data.mints;
            } catch(e) { console.warn('mints query failed', e); }

            if (mints && mints.length > 0) {
                renderPairEvents(mints, tokenSymbol, 'lp');
                return;
            }

            // 回退 swaps
            var swaps = null;
            try {
                var swapsQuery = `{ swaps(first: 10, orderBy: timestamp, orderDirection: desc, where: { pair: "${lowerPair}" }) { transaction { id } amount0In amount1In amount0Out amount1Out timestamp } }`;
                var sdata = await subgraphQuery(swapsQuery);
                if (sdata && sdata.swaps) swaps = sdata.swaps;
            } catch(e) { console.warn('swaps query failed', e); }

            if (swaps && swaps.length > 0) {
                renderPairEvents(swaps, tokenSymbol, 'swap');
            } else {
                container.innerHTML = '<div class="no-record">暂无交易记录</div>';
            }
        }

        function renderPairEvents(events, tokenSymbol, type) {
            var container = $('tradeRecordContent');
            if (!container) return;
            var html = '';
            for (var i = 0; i < events.length; i++) {
                var ev = events[i];
                if (type === 'lp') {
                    var a0 = parseFloat(web3.utils.fromWei(ev.amount0, 'ether')) || 0;
                    var a1 = parseFloat(web3.utils.fromWei(ev.amount1, 'ether')) || 0;
                    var time = new Date(ev.timestamp * 1000).toLocaleString();
                    html += '<div class="lp-trade-item"><span class="lp-trade-action">添加 LP</span><span class="lp-trade-amount">+' + a0.toFixed(4) + ' USDT +' + a1.toFixed(4) + ' ' + tokenSymbol + '</span><span style="color:#888;font-size:11px;">' + time + '</span></div>';
                } else {
                    var aIn = parseFloat(web3.utils.fromWei(ev.amount0In, 'ether')) || parseFloat(web3.utils.fromWei(ev.amount1In, 'ether'));
                    var aOut = parseFloat(web3.utils.fromWei(ev.amount0Out, 'ether')) || parseFloat(web3.utils.fromWei(ev.amount1Out, 'ether'));
                    var time = new Date(ev.timestamp * 1000).toLocaleString();
                    html += '<div class="lp-trade-item"><span class="lp-trade-action">Swap</span><span class="lp-trade-amount">' + aIn.toFixed(4) + ' USDT → ' + aOut.toFixed(4) + ' ' + tokenSymbol + '</span><span style="color:#888;font-size:11px;">' + time + '</span></div>';
                }
            }
            container.innerHTML = html;
            $('tradeTime').textContent = '交易对: ' + tokenSymbol + '/USDT';
        }

        $('lpSearchBtn').addEventListener('click', async function() {
            var addr = $('lpContractSearch').value.trim();
            if (!web3 || !addr) return;
            if (!/^0x[a-fA-F0-9]{40}$/.test(addr)) { parent.showToast('无效的合约地址', 'error'); return; }
            
            // 确保网络正确
            $('tradeRecordContent').innerHTML = '<div class="no-record">⏳ 检查网络...</div>';
            var networkOk = await ensureCorrectNetwork();
            if (!networkOk) return;

            $('tradeRecordContent').innerHTML = '<div class="no-record">⏳ 正在获取LP记录...</div>';

            try {
                var contract = new web3.eth.Contract(ERC20_ABI, addr);
                var symbol;
                try { symbol = await contract.methods.symbol().call(); } catch(e1) {
                    try { symbol = await contract.methods.name().call(); } catch(e2) { symbol = addr.substring(0,8) + '...'; }
                }

                var factoryContract = new web3.eth.Contract(FACTORY_ABI, FACTORY);
                var usdtAddr = TOKEN_ADDRESSES['USDT'];
                var pair = await factoryContract.methods.getPair(addr, usdtAddr).call();
                
                lpTokenAddress = addr;
                updateLPTokenDisplay(symbol);
                parent.showToast(pair !== '0x0000000000000000000000000000000000000000' ? '已找到 ' + symbol + '/USDT 交易对' : '未找到与 USDT 的交易对', 'success');

                var tokenPrice = await fetchTokenPriceInUSDT(addr);
                lpPriceRate = tokenPrice > 0 ? 1 / tokenPrice : 0;
                updatePriceDisplay();

                var targetPair = pair !== '0x0000000000000000000000000000000000000000' ? pair : await factoryContract.methods.getPair(addr, WBNB).call();
                if (targetPair !== '0x0000000000000000000000000000000000000000') {
                    fetchPairEvents(targetPair, symbol);
                } else {
                    $('tradeRecordContent').innerHTML = '<div class="no-record">未找到交易对</div>';
                }

                $('lpContractSearch').value = symbol;
                updateLPBalances();
                $('lpAmountFirst').value = ''; $('lpAmountSecond').value = '';
            } catch(e) { console.error(e); parent.showToast('获取代币信息失败', 'error'); $('tradeRecordContent').innerHTML = '<div class="no-record">⚠️ 获取信息失败</div>'; }
        });

        $('lpAmountFirst').addEventListener('input', function() {
            var v = parseFloat(this.value);
            if (!isNaN(v) && lpPriceRate > 0) $('lpAmountSecond').value = (v * lpPriceRate).toFixed(6);
            else $('lpAmountSecond').value = '';
        });
        $('lpAmountSecond').addEventListener('input', function() {
            var v = parseFloat(this.value);
            if (!isNaN(v) && lpPriceRate > 0) $('lpAmountFirst').value = (v / lpPriceRate).toFixed(6);
            else $('lpAmountFirst').value = '';
        });

        // ========== 添加流动性（完整实现） ==========
        window.addLiquidity = async function() {
            if (!window.currentAccount) {
                parent.showToast('请先连接钱包', 'error');
                return;
            }
            if (!lpTokenAddress) {
                parent.showToast('请先搜索并加载代币合约', 'error');
                return;
            }
            var usdtAmount = $('lpAmountFirst').value;
            var tokenAmount = $('lpAmountSecond').value;
            if (!usdtAmount || parseFloat(usdtAmount) <= 0) {
                parent.showToast('请输入 USDT 数量', 'error');
                return;
            }
            if (!tokenAmount || parseFloat(tokenAmount) <= 0) {
                parent.showToast('请输入代币数量', 'error');
                return;
            }

            var btn = $('lpAddBtn');
            btn.disabled = true;
            btn.textContent = '添加 LP 中...';

            try {
                var account = window.currentAccount;
                var usdtAddr = TOKEN_ADDRESSES['USDT'];
                var tokenAddr = lpTokenAddress;

                var usdtDecimals = await getDecimals('USDT');
                var tokenDecimals = await new web3.eth.Contract(ERC20_ABI, tokenAddr).methods.decimals().call();

                var amountADesired = web3.utils.toWei(usdtAmount, 'ether');
                if (usdtDecimals !== 18) {
                    amountADesired = BigInt(Math.floor(parseFloat(usdtAmount) * (10 ** usdtDecimals))).toString();
                }
                var amountBDesired = web3.utils.toWei(tokenAmount, 'ether');
                if (tokenDecimals !== 18) {
                    amountBDesired = BigInt(Math.floor(parseFloat(tokenAmount) * (10 ** tokenDecimals))).toString();
                }

                var amountAMin = (BigInt(amountADesired) * BigInt(995) / BigInt(1000)).toString();
                var amountBMin = (BigInt(amountBDesired) * BigInt(995) / BigInt(1000)).toString();

                // 授权 USDT
                var usdtContract = new web3.eth.Contract(ERC20_ABI, usdtAddr);
                var usdtAllowance = await usdtContract.methods.allowance(account, ROUTER).call();
                if (BigInt(usdtAllowance) < BigInt(amountADesired)) {
                    btn.textContent = '授权 USDT...';
                    parent.showToast('请确认授权 USDT', 'info');
                    var approveTx = usdtContract.methods.approve(ROUTER, MAX_UINT256);
                    var approveGas = await approveTx.estimateGas({ from: account });
                    await approveTx.send({ from: account, gas: Math.floor(approveGas * 1.2) });
                    parent.showToast('USDT 授权成功', 'success');
                }

                // 授权代币
                var tokenContract = new web3.eth.Contract(ERC20_ABI, tokenAddr);
                var tokenAllowance = await tokenContract.methods.allowance(account, ROUTER).call();
                if (BigInt(tokenAllowance) < BigInt(amountBDesired)) {
                    btn.textContent = '授权 ' + lpTokenSymbol + '...';
                    parent.showToast('请确认授权 ' + lpTokenSymbol, 'info');
                    var approveTx2 = tokenContract.methods.approve(ROUTER, MAX_UINT256);
                    var approveGas2 = await approveTx2.estimateGas({ from: account });
                    await approveTx2.send({ from: account, gas: Math.floor(approveGas2 * 1.2) });
                    parent.showToast(lpTokenSymbol + ' 授权成功', 'success');
                }

                // 添加流动性
                btn.textContent = '正在添加流动性...';
                var routerContract = new web3.eth.Contract(ROUTER_ABI, ROUTER);
                var deadline = Math.floor(Date.now() / 1000) + 600;

                var tokenA = usdtAddr.toLowerCase() < tokenAddr.toLowerCase() ? usdtAddr : tokenAddr;
                var tokenB = tokenA === usdtAddr ? tokenAddr : usdtAddr;
                var amountA = tokenA === usdtAddr ? amountADesired : amountBDesired;
                var amountB = tokenA === usdtAddr ? amountBDesired : amountADesired;
                var amountAMinFinal = tokenA === usdtAddr ? amountAMin : amountBMin;
                var amountBMinFinal = tokenA === usdtAddr ? amountBMin : amountAMin;

                var tx = await routerContract.methods.addLiquidity(
                    tokenA, tokenB,
                    amountA, amountB,
                    amountAMinFinal, amountBMinFinal,
                    account, deadline
                ).send({ from: account });

                // 保存交易记录
                var record = {
                    time: new Date().toLocaleString(),
                    inputToken: 'USDT',
                    outputToken: lpTokenSymbol,
                    inputAmount: usdtAmount,
                    outputAmount: tokenAmount,
                    txHash: tx.transactionHash
                };
                saveTradeRecord(record);
                renderRecentTrade();
                parent.showToast('流动性添加成功！', 'success');
                $('lpAmountFirst').value = '';
                $('lpAmountSecond').value = '';
                updateLPBalances();
            } catch (e) {
                console.error(e);
                var msg = e.message || '';
                if (msg.includes('User denied') || msg.includes('rejected')) {
                    parent.showToast('交易已取消', 'error');
                } else {
                    parent.showToast('添加 LP 失败: ' + msg.substring(0, 100), 'error');
                }
            } finally {
                btn.disabled = false;
                updateLPButton();
            }
        };

        updateLPButton();
        showSwapView();
        if (window.web3 && window.currentAccount) { updateBalances(); updateRate(); }
        else setTimeout(function() { if (window.web3 && window.currentAccount) { updateBalances(); updateRate(); } }, 500);
    })();
    </script>
