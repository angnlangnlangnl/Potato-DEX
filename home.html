<div id="page-home" class="page-container">
    <style>
        .swap-container { padding: 20px 0; }
        .search-bar {
            background: rgba(18,22,40,0.8); border: 1px solid #2d325a;
            border-radius: 12px; padding: 12px 16px; margin-bottom: 15px;
            display: flex; align-items: center; gap: 10px;
        }
        .search-bar input {
            flex: 1; background: transparent; border: none;
            color: #fff; font-size: 15px; outline: none;
        }
        .search-bar input::placeholder { color: #666; }
        .search-bar .search-icon { color: #888; font-size: 18px; }
        .swap-card {
            background: rgba(18,22,40,0.8); border: 1px solid #2d325a;
            border-radius: 20px; padding: 20px;
        }
        .swap-title { font-size: 16px; font-weight: bold; margin-bottom: 15px; color: #f0b90b; }
        .token-input {
            background: #0d1125; border: 1px solid #2d325a; border-radius: 16px;
            padding: 12px 15px; margin-bottom: 5px; display: flex; justify-content: space-between; align-items: center;
        }
        .token-input input {
            background: transparent; border: none; color: #fff; font-size: 24px;
            width: 60%; outline: none; -moz-appearance: textfield;
        }
        .token-input input::-webkit-outer-spin-button,
        .token-input input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
        .token-select {
            background: #2d325a; border: none; color: #fff; padding: 8px 12px;
            border-radius: 20px; font-size: 14px; cursor: pointer; display: flex; align-items: center; gap: 6px;
        }
        .token-balance { font-size: 11px; color: #888; margin-left: 5px; }
        .swap-arrow {
            width: 40px; height: 40px; background: #1e2a4a; border: 2px solid #2d325a;
            border-radius: 50%; display: flex; align-items: center; justify-content: center;
            margin: -10px auto; position: relative; z-index: 2; cursor: pointer; color: #f0b90b; font-size: 18px;
        }
        .swap-btn {
            width: 100%; padding: 14px; border: none; border-radius: 16px;
            font-size: 16px; font-weight: bold; cursor: pointer; margin-top: 15px; transition: 0.3s;
        }
        .swap-btn.active { background: linear-gradient(135deg, #f0b90b, #f7c744); color: #0b0f1a; }
        .swap-btn.disabled { background: #2d325a; color: #666; cursor: not-allowed; }
        .price-info { font-size: 12px; color: #888; margin-top: 10px; text-align: center; }
    </style>

    <div class="swap-container">
        <!-- 新增代币搜索栏 -->
        <div class="search-bar">
            <span class="search-icon">🔍</span>
            <input type="text" id="tokenSearch" placeholder="输入代币名称或合约地址" autocomplete="off">
        </div>

        <div class="swap-card">
            <div class="swap-title">🔄 兑换代币</div>
            <div style="display:flex;justify-content:flex-end;margin-bottom:8px;">
                <span style="font-size:12px;color:#888;">滑点 0.5%</span>
            </div>
            
            <div class="token-input">
                <input type="number" id="inputAmount" placeholder="0.0" step="any">
                <button class="token-select" onclick="selectToken('input')">
                    <span id="inputToken">POTATO</span> ▼
                </button>
            </div>
            <div style="text-align:right;padding-right:10px;">
                <span class="token-balance">余额: <span id="inputBalance">0.00</span></span>
            </div>

            <div class="swap-arrow" onclick="swapTokens()">↓</div>

            <div class="token-input">
                <input type="number" id="outputAmount" placeholder="0.0" readonly>
                <button class="token-select" onclick="selectToken('output')">
                    <span id="outputToken">ETH</span> ▼
                </button>
            </div>
            <div style="text-align:right;padding-right:10px;">
                <span class="token-balance">余额: <span id="outputBalance">0.00</span></span>
            </div>

            <button id="swapButton" class="swap-btn disabled" onclick="executeSwap()">连接钱包</button>
            <div class="price-info">1 POTATO = <span id="exchangeRate">--</span> ETH</div>
        </div>
    </div>

    <script>
    var tokenPrices = {
        'POTATO': { price: 0.0001, balance: 10000 },
        'ETH': { price: 3000, balance: 1.5 },
        'USDT': { price: 1, balance: 5000 },
        'LAND': { price: 50, balance: 100 }
    };
    var currentInputToken = 'POTATO';
    var currentOutputToken = 'ETH';

    function updateSwapUI() {
        var inputAmt = parseFloat(document.getElementById('inputAmount').value) || 0;
        var rate = getExchangeRate();
        document.getElementById('exchangeRate').textContent = rate.toFixed(6);
        if (inputAmt > 0 && rate > 0) {
            document.getElementById('outputAmount').value = (inputAmt * rate * 0.995).toFixed(6);
        } else {
            document.getElementById('outputAmount').value = '0.0';
        }
        updateBalances();
        updateSwapButton();
    }

    function getExchangeRate() {
        if (currentInputToken === currentOutputToken) return 1;
        var inputPrice = tokenPrices[currentInputToken] ? tokenPrices[currentInputToken].price : 0;
        var outputPrice = tokenPrices[currentOutputToken] ? tokenPrices[currentOutputToken].price : 0;
        return outputPrice > 0 ? inputPrice / outputPrice : 0;
    }

    function updateBalances() {
        if (tokenPrices[currentInputToken]) {
            document.getElementById('inputBalance').textContent = tokenPrices[currentInputToken].balance.toFixed(2);
        }
        if (tokenPrices[currentOutputToken]) {
            document.getElementById('outputBalance').textContent = tokenPrices[currentOutputToken].balance.toFixed(2);
        }
    }

    function updateSwapButton() {
        var btn = document.getElementById('swapButton');
        var inputAmt = parseFloat(document.getElementById('inputAmount').value) || 0;
        if (!window.isConnected) {
            btn.textContent = '连接钱包';
            btn.className = 'swap-btn disabled';
        } else if (inputAmt <= 0) {
            btn.textContent = '输入金额';
            btn.className = 'swap-btn disabled';
        } else if (inputAmt > (tokenPrices[currentInputToken] ? tokenPrices[currentInputToken].balance : 0)) {
            btn.textContent = '余额不足';
            btn.className = 'swap-btn disabled';
        } else {
            btn.textContent = '兑换';
            btn.className = 'swap-btn active';
        }
    }

    function swapTokens() {
        var temp = currentInputToken;
        currentInputToken = currentOutputToken;
        currentOutputToken = temp;
        document.getElementById('inputToken').textContent = currentInputToken;
        document.getElementById('outputToken').textContent = currentOutputToken;
        document.getElementById('inputAmount').value = '';
        document.getElementById('outputAmount').value = '0.0';
        updateSwapUI();
    }

    function selectToken(type) {
        var tokens = Object.keys(tokenPrices);
        var selected = prompt('选择代币:\n' + tokens.join(', '), type === 'input' ? currentInputToken : currentOutputToken);
        if (selected && tokenPrices[selected]) {
            if (type === 'input') {
                currentInputToken = selected;
                document.getElementById('inputToken').textContent = selected;
            } else {
                currentOutputToken = selected;
                document.getElementById('outputToken').textContent = selected;
            }
            document.getElementById('inputAmount').value = '';
            document.getElementById('outputAmount').value = '0.0';
            updateSwapUI();
        }
    }

    function executeSwap() {
        if (!window.isConnected) {
            window.top.showToast ? window.top.showToast('请先连接钱包', 'error') : alert('请先连接钱包');
            return;
        }
        var inputAmt = parseFloat(document.getElementById('inputAmount').value) || 0;
        var outputAmt = parseFloat(document.getElementById('outputAmount').value) || 0;
        if (inputAmt > 0 && outputAmt > 0) {
            window.top.showToast('兑换成功！' + inputAmt + ' ' + currentInputToken + ' → ' + outputAmt + ' ' + currentOutputToken, 'success');
            document.getElementById('inputAmount').value = '';
            document.getElementById('outputAmount').value = '0.0';
            updateSwapUI();
        }
    }

    document.getElementById('inputAmount').addEventListener('input', updateSwapUI);
    document.addEventListener('walletConnected', updateSwapUI);
    document.addEventListener('walletDisconnected', updateSwapUI);

    updateBalances();
    updateSwapUI();
    </script>
</div>
