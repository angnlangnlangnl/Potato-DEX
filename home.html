<div id="page-trade" class="page-container">
    <style>
        .swap-container { padding: 20px 10px; }
        .swap-card {
            background: rgba(18, 22, 40, 0.8); border: 1px solid #2d325a;
            border-radius: 20px; padding: 20px; margin-bottom: 20px;
        }
        .swap-title { font-size: 16px; font-weight: bold; margin-bottom: 15px; color: #f0b90b; }
        .token-input {
            background: #0d1125; border: 1px solid #2d325a; border-radius: 16px;
            padding: 12px 15px; margin-bottom: 5px; display: flex; justify-content: space-between; align-items: center;
        }
        .token-input input {
            background: transparent; border: none; color: #fff; font-size: 24px;
            width: 60%; outline: none; -moz-appearance: textfield;
        }
        .token-input input::-webkit-outer-spin-button,
        .token-input input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
        .token-select {
            background: #2d325a; border: none; color: #fff; padding: 8px 12px;
            border-radius: 20px; font-size: 14px; cursor: pointer; display: flex; align-items: center; gap: 6px;
        }
        .token-balance { font-size: 11px; color: #888; margin-left: 5px; }
        .swap-arrow {
            width: 40px; height: 40px; background: #1e2a4a; border: 2px solid #2d325a;
            border-radius: 50%; display: flex; align-items: center; justify-content: center;
            margin: -10px auto; position: relative; z-index: 2; cursor: pointer; color: #f0b90b; font-size: 18px;
        }
        .swap-btn {
            width: 100%; padding: 14px; border: none; border-radius: 16px;
            font-size: 16px; font-weight: bold; cursor: pointer; margin-top: 15px; transition: 0.3s;
        }
        .swap-btn.active { background: linear-gradient(135deg, #f0b90b, #f7c744); color: #0b0f1a; }
        .swap-btn.disabled { background: #2d325a; color: #666; cursor: not-allowed; }
        .price-info { font-size: 12px; color: #888; margin-top: 10px; text-align: center; }
    </style>

    <div class="swap-container">
        <!-- 第一个买卖卡片 -->
        <div class="swap-card" id="swapCard1">
            <div class="swap-title">🔄 兑换代币</div>
            <div style="display:flex;justify-content:flex-end;margin-bottom:8px;">
                <span style="font-size:12px;color:#888;">滑点 0.5%</span>
            </div>
            
            <div class="token-input">
                <input type="number" id="inputAmount1" placeholder="0.0" step="any">
                <button class="token-select" onclick="selectToken('input', 1)">
                    <span id="inputToken1">POTATO</span> ▼
                </button>
            </div>
            <div style="text-align:right;padding-right:10px;">
                <span class="token-balance">余额: <span id="inputBalance1">0.00</span></span>
            </div>

            <div class="swap-arrow" onclick="swapTokens(1)">↓</div>

            <div class="token-input">
                <input type="number" id="outputAmount1" placeholder="0.0" readonly>
                <button class="token-select" onclick="selectToken('output', 1)">
                    <span id="outputToken1">ETH</span> ▼
                </button>
            </div>
            <div style="text-align:right;padding-right:10px;">
                <span class="token-balance">余额: <span id="outputBalance1">0.00</span></span>
            </div>

            <button id="swapButton1" class="swap-btn disabled" onclick="executeSwap(1)">连接钱包</button>
            <div class="price-info">1 <span id="rateInputToken1">POTATO</span> = <span id="exchangeRate1">--</span> <span id="rateOutputToken1">ETH</span></div>
        </div>

        <!-- 第二个买卖卡片（复制） -->
        <div class="swap-card" id="swapCard2">
            <div class="swap-title">🔄 兑换代币</div>
            <div style="display:flex;justify-content:flex-end;margin-bottom:8px;">
                <span style="font-size:12px;color:#888;">滑点 0.5%</span>
            </div>
            
            <div class="token-input">
                <input type="number" id="inputAmount2" placeholder="0.0" step="any">
                <button class="token-select" onclick="selectToken('input', 2)">
                    <span id="inputToken2">POTATO</span> ▼
                </button>
            </div>
            <div style="text-align:right;padding-right:10px;">
                <span class="token-balance">余额: <span id="inputBalance2">0.00</span></span>
            </div>

            <div class="swap-arrow" onclick="swapTokens(2)">↓</div>

            <div class="token-input">
                <input type="number" id="outputAmount2" placeholder="0.0" readonly>
                <button class="token-select" onclick="selectToken('output', 2)">
                    <span id="outputToken2">ETH</span> ▼
                </button>
            </div>
            <div style="text-align:right;padding-right:10px;">
                <span class="token-balance">余额: <span id="outputBalance2">0.00</span></span>
            </div>

            <button id="swapButton2" class="swap-btn disabled" onclick="executeSwap(2)">连接钱包</button>
            <div class="price-info">1 <span id="rateInputToken2">POTATO</span> = <span id="exchangeRate2">--</span> <span id="rateOutputToken2">ETH</span></div>
        </div>
    </div>

    <script>
        // 模拟代币数据
        var tokenPrices = {
            'POTATO': { price: 0.0001, balance: 10000 },
            'ETH': { price: 3000, balance: 1.5 },
            'USDT': { price: 1, balance: 5000 },
            'LAND': { price: 50, balance: 100 }
        };

        // 每个卡片的当前代币选择
        var swapState = {
            1: { inputToken: 'POTATO', outputToken: 'ETH' },
            2: { inputToken: 'POTATO', outputToken: 'ETH' }
        };

        function updateSwapUI(cardId) {
            var id = cardId;
            var inputAmt = parseFloat(document.getElementById('inputAmount' + id).value) || 0;
            var state = swapState[id];
            var rate = getExchangeRate(state.inputToken, state.outputToken);
            document.getElementById('exchangeRate' + id).textContent = rate.toFixed(6);
            document.getElementById('rateInputToken' + id).textContent = state.inputToken;
            document.getElementById('rateOutputToken' + id).textContent = state.outputToken;
            
            if (inputAmt > 0 && rate > 0) {
                document.getElementById('outputAmount' + id).value = (inputAmt * rate * 0.995).toFixed(6);
            } else {
                document.getElementById('outputAmount' + id).value = '0.0';
            }
            updateBalances(id);
            updateSwapButton(id);
        }

        function getExchangeRate(inputToken, outputToken) {
            if (inputToken === outputToken) return 1;
            var inputPrice = tokenPrices[inputToken] ? tokenPrices[inputToken].price : 0;
            var outputPrice = tokenPrices[outputToken] ? tokenPrices[outputToken].price : 0;
            return outputPrice > 0 ? inputPrice / outputPrice : 0;
        }

        function updateBalances(cardId) {
            var state = swapState[cardId];
            var inputToken = state.inputToken;
            var outputToken = state.outputToken;
            if (tokenPrices[inputToken]) {
                document.getElementById('inputBalance' + cardId).textContent = tokenPrices[inputToken].balance.toFixed(2);
            }
            if (tokenPrices[outputToken]) {
                document.getElementById('outputBalance' + cardId).textContent = tokenPrices[outputToken].balance.toFixed(2);
            }
        }

        function updateSwapButton(cardId) {
            var btn = document.getElementById('swapButton' + cardId);
            var inputAmt = parseFloat(document.getElementById('inputAmount' + cardId).value) || 0;
            var state = swapState[cardId];
            var inputToken = state.inputToken;
            
            if (!window.isConnected) {
                btn.textContent = '连接钱包';
                btn.className = 'swap-btn disabled';
            } else if (inputAmt <= 0) {
                btn.textContent = '输入金额';
                btn.className = 'swap-btn disabled';
            } else if (inputAmt > (tokenPrices[inputToken] ? tokenPrices[inputToken].balance : 0)) {
                btn.textContent = '余额不足';
                btn.className = 'swap-btn disabled';
            } else {
                btn.textContent = '兑换';
                btn.className = 'swap-btn active';
            }
        }

        function swapTokens(cardId) {
            var state = swapState[cardId];
            var temp = state.inputToken;
            state.inputToken = state.outputToken;
            state.outputToken = temp;
            document.getElementById('inputToken' + cardId).textContent = state.inputToken;
            document.getElementById('outputToken' + cardId).textContent = state.outputToken;
            document.getElementById('inputAmount' + cardId).value = '';
            document.getElementById('outputAmount' + cardId).value = '0.0';
            updateSwapUI(cardId);
        }

        function selectToken(type, cardId) {
            var tokens = Object.keys(tokenPrices);
            var state = swapState[cardId];
            var current = type === 'input' ? state.inputToken : state.outputToken;
            var selected = prompt('选择代币:\n' + tokens.join(', '), current);
            if (selected && tokenPrices[selected]) {
                if (type === 'input') {
                    state.inputToken = selected;
                    document.getElementById('inputToken' + cardId).textContent = selected;
                } else {
                    state.outputToken = selected;
                    document.getElementById('outputToken' + cardId).textContent = selected;
                }
                document.getElementById('inputAmount' + cardId).value = '';
                document.getElementById('outputAmount' + cardId).value = '0.0';
                updateSwapUI(cardId);
            }
        }

        function executeSwap(cardId) {
            if (!window.isConnected) {
                window.top.showToast ? window.top.showToast('请先连接钱包', 'error') : alert('请先连接钱包');
                return;
            }
            var inputAmt = parseFloat(document.getElementById('inputAmount' + cardId).value) || 0;
            var outputAmt = parseFloat(document.getElementById('outputAmount' + cardId).value) || 0;
            var state = swapState[cardId];
            if (inputAmt > 0 && outputAmt > 0) {
                window.top.showToast('兑换成功！' + inputAmt + ' ' + state.inputToken + ' → ' + outputAmt + ' ' + state.outputToken, 'success');
                document.getElementById('inputAmount' + cardId).value = '';
                document.getElementById('outputAmount' + cardId).value = '0.0';
                updateSwapUI(cardId);
            }
        }

        // 绑定输入事件和钱包事件
        document.addEventListener('DOMContentLoaded', function() {
            // 为两个卡片的输入框绑定事件
            for (var i = 1; i <= 2; i++) {
                (function(id) {
                    document.getElementById('inputAmount' + id).addEventListener('input', function() {
                        updateSwapUI(id);
                    });
                })(i);
            }
            // 初始化两个卡片
            updateSwapUI(1);
            updateSwapUI(2);
        });

        document.addEventListener('walletConnected', function() {
            updateSwapUI(1);
            updateSwapUI(2);
        });
        document.addEventListener('walletDisconnected', function() {
            updateSwapUI(1);
            updateSwapUI(2);
        });
    </script>
</div>
