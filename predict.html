<div id="page-markets" class="page-container">
    <style>
        /* ================= 行情页专属样式 ================= */
        :root {
            --bg-primary: #0F111D;
            --bg-card: #1A1D2E;
            --bg-search: #1A1D2E;
            --bg-tag: #252A40;
            --text-white: #EAECF0;
            --text-grey: #6B7394;
            --text-light-grey: #8E94B2;
            --divider: #1E2139;
            --loss-red: #E8455B;
            --gain-green: #26A69A;
        }

        .market-wrap {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            color: var(--text-white);
            min-height: 100vh;
            -webkit-font-smoothing: antialiased;
        }

        /* 搜索框 */
        .market-search {
            padding: 12px 0;
            position: sticky;
            top: 70px; /* 留出主框架 header 高度 */
            z-index: 5;
            background: var(--bg-primary);
        }
        .search-bar {
            display: flex; align-items: center; background: var(--bg-search);
            border-radius: 8px; padding: 0 12px; height: 40px;
        }
        .search-bar input {
            flex: 1; background: transparent; border: none; outline: none;
            color: var(--text-white); font-size: 14px;
        }
        .search-bar input::placeholder { color: var(--text-grey); }
        .search-bar .icon { color: var(--text-grey); font-size: 18px; margin: 0 4px; }

        /* 导航标签 */
        .nav-tabs {
            display: flex; padding: 8px 0; gap: 20px; overflow-x: auto; scrollbar-width: none;
        }
        .nav-tabs::-webkit-scrollbar { display: none; }
        .nav-tab {
            font-size: 16px; white-space: nowrap; color: var(--text-grey); cursor: pointer;
        }
        .nav-tab.active { color: var(--text-white); font-weight: 700; }

        .tags-row {
            display: flex; align-items: center; padding: 8px 0; gap: 16px;
        }
        .tags-scroll {
            display: flex; flex: 1; gap: 16px; overflow-x: auto; scrollbar-width: none;
        }
        .tags-scroll::-webkit-scrollbar { display: none; }
        .tag-item {
            font-size: 14px; white-space: nowrap; color: var(--text-light-grey); cursor: pointer;
        }
        .tag-item.active { color: var(--text-white); }

        /* 表头 */
        .table-header {
            display: flex; padding: 8px 0; font-size: 12px; color: var(--text-light-grey);
            border-bottom: 0.5px solid var(--divider);
        }
        .col-name { flex: 4; display: flex; align-items: center; gap: 4px; }
        .col-price { flex: 3; display: flex; align-items: center; justify-content: flex-end; gap: 4px; }
        .col-change { flex: 2; display: flex; align-items: center; justify-content: flex-end; gap: 4px; }

        /* 币种列表项 */
        .coin-item {
            display: flex; padding: 14px 0; border-bottom: 0.5px solid var(--divider);
            transition: background 0.2s;
        }
        .coin-item:nth-child(even) { background-color: #131626; }

        .coin-name-section { flex: 4; display: flex; flex-direction: column; justify-content: center; gap: 4px; }
        .coin-symbol-row { display: flex; align-items: center; gap: 6px; }
        .coin-symbol { font-size: 15px; font-weight: 500; }
        .leverage-tag {
            font-size: 10px; background: var(--bg-tag); color: var(--text-light-grey);
            padding: 1px 5px; border-radius: 4px;
        }
        .coin-volume { font-size: 12px; color: var(--text-grey); }

        .coin-price-section { flex: 3; display: flex; flex-direction: column; align-items: flex-end; justify-content: center; gap: 4px; }
        .coin-price { font-size: 15px; font-weight: 500; }
        .coin-cny { font-size: 12px; color: var(--text-light-grey); }

        .coin-change-section { flex: 2; display: flex; align-items: center; justify-content: flex-end; }
        .change-badge {
            padding: 4px 0; border-radius: 4px; font-size: 13px; font-weight: 500;
            text-align: center; width: 70px; color: var(--text-white);
        }
        .change-badge.up { background: var(--gain-green); }
        .change-badge.down { background: var(--loss-red); }
    </style>

    <div class="market-wrap">
        <!-- 搜索框 -->
        <div class="market-search">
            <div class="search-bar">
                <span class="icon">🔍</span>
                <input type="text" placeholder="搜索币种/币对/合约" readonly>
                <span class="icon">⋯</span>
            </div>
        </div>

        <!-- 二级导航 -->
        <div class="nav-tabs">
            <span class="nav-tab active">自选</span>
            <span class="nav-tab">市场</span>
            <span class="nav-tab">Alpha</span>
            <span class="nav-tab">金融增长</span>
            <span class="nav-tab">大数据</span>
        </div>

        <!-- 标签筛选 -->
        <div class="tags-row">
            <div class="tags-scroll">
                <span class="tag-item active">全部</span>
                <span class="tag-item">现货</span>
                <span class="tag-item">Alpha</span>
                <span class="tag-item">合约</span>
                <span class="tag-item">期权</span>
            </div>
        </div>

        <!-- 表头 -->
        <div class="table-header">
            <div class="col-name">名称 ⇅ 成交额</div>
            <div class="col-price">最新价格 ⇅</div>
            <div class="col-change">24h涨跌 ⇅</div>
        </div>

        <!-- 数据列表容器 -->
        <div class="coin-list" id="coinList">
            <div style="text-align: center; padding: 40px; color: var(--text-light-grey);">正在加载 BSC 实时行情数据...</div>
        </div>
    </div>

    <script>
    (function() {
        const SYMBOLS = ['BTCUSDT', 'ETHUSDT', 'BNBUSDT', 'XRPUSDT', 'SOLUSDT', 'DOGEUSDT'];
        const CNY_RATE = 7.25;

        function renderCoins(dataList) {
            const container = document.getElementById('coinList');
            if (!container) return;
            container.innerHTML = '';

            dataList.forEach(coin => {
                const rawPrice = parseFloat(coin.lastPrice);
                const changePercent = parseFloat(coin.priceChangePercent);
                const isUp = changePercent >= 0;
                const quoteVol = parseFloat(coin.quoteVolume);

                let priceStr = rawPrice.toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 4 });
                if (rawPrice < 0.01) priceStr = rawPrice.toFixed(8);
                let changeStr = changePercent.toFixed(2) + '%';
                if (isUp) changeStr = '+' + changeStr;

                let volStr = '';
                if (quoteVol >= 100000000) {
                    volStr = (quoteVol / 100000000).toFixed(2) + '亿';
                } else if (quoteVol >= 10000) {
                    volStr = (quoteVol / 10000).toFixed(2) + '万';
                } else {
                    volStr = quoteVol.toFixed(0);
                }

                const cnyStr = '≈ ¥' + (rawPrice * CNY_RATE).toFixed(2);
                const displaySymbol = coin.symbol.replace('USDT', '/USDT');

                const item = document.createElement('div');
                item.className = 'coin-item';
                item.innerHTML = `
                    <div class="coin-name-section">
                        <div class="coin-symbol-row">
                            <span class="coin-symbol">${displaySymbol}</span>
                            <span class="leverage-tag">10x</span>
                        </div>
                        <div class="coin-volume">${volStr}</div>
                    </div>
                    <div class="coin-price-section">
                        <div class="coin-price">${priceStr}</div>
                        <div class="coin-cny">${cnyStr}</div>
                    </div>
                    <div class="coin-change-section">
                        <div class="change-badge ${isUp ? 'up' : 'down'}">${changeStr}</div>
                    </div>
                `;
                container.appendChild(item);
            });
        }

        async function fetchMarketData() {
            try {
                const fetchPromises = SYMBOLS.map(symbol => 
                    fetch(`https://api.binance.com/api/v3/ticker/24hr?symbol=${symbol}`)
                        .then(res => { if(!res.ok) throw new Error('API Request Failed'); return res.json(); })
                );
                const results = await Promise.all(fetchPromises);
                renderCoins(results);
            } catch (error) {
                const container = document.getElementById('coinList');
                if (!container) return;
                container.innerHTML = `
                    <div style="text-align: center; padding: 40px; color: var(--loss-red);">
                        ⚠️ 数据加载失败，请检查网络后刷新重试<br>
                        <span style="font-size: 12px; color: var(--text-light-grey); margin-top:8px; display:block;">${error.message}</span>
                    </div>`;
            }
        }

        fetchMarketData();
        setInterval(fetchMarketData, 10000);
    })();
    </script>
</div>
