<div id="page-assets" class="page-container">
    <style>
        .glass-card { 
            background: rgba(18,22,40,0.7); 
            backdrop-filter: blur(16px); 
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 16px; 
            padding: 16px; 
            margin-bottom: 15px; 
            color: #ccd6f0; 
        }
        .flex-row { display: flex; justify-content: space-between; align-items: center; }
        .title-main { color: #f0b90b; font-size: 18px; font-weight: bold; }
        .desc { color: #a3adc9; font-size: 13px; }
        .stat-val { font-size: 24px; font-weight: bold; color: #4ecca3; }
        .green-text { color: #4ecca3; }

        /* 资产列表卡片 */
        .wallet-assets { margin-top: -5px; }
        .wa-header { 
            display: flex; justify-content: space-between; align-items: center; 
            padding: 0 0 12px 0; border-bottom: 1px solid rgba(255,255,255,0.08); 
        }
        .wa-tab { font-size: 15px; color: #f0b90b; font-weight: 600; }
        .wa-actions { display: flex; gap: 16px; color: #a3adc9; }
        .wa-actions span { font-size: 18px; cursor: pointer; }
        .wa-asset-list { display: flex; flex-direction: column; }
        .wa-asset-item {
            display: flex; align-items: center; justify-content: space-between;
            padding: 14px 0; border-bottom: 1px solid rgba(255,255,255,0.08);
            cursor: pointer; transition: background 0.2s;
        }
        .wa-asset-item:active { background: rgba(255,255,255,0.03); }
        .wa-asset-left { display: flex; align-items: center; gap: 12px; }
        .wa-token-icon-wrapper { position: relative; width: 40px; height: 40px; }
        .wa-token-icon {
            width: 100%; height: 100%; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-weight: bold; font-size: 16px; color: white;
        }
        .wa-network-badge {
            position: absolute; bottom: -2px; right: -2px;
            width: 16px; height: 16px; border-radius: 50%;
            border: 2px solid rgba(18,22,40,0.7);
            display: flex; align-items: center; justify-content: center; background: #fff;
        }
        .wa-token-info { display: flex; flex-direction: column; gap: 2px; }
        .wa-token-name { font-size: 16px; font-weight: 500; color: #EAECF0; }
        .wa-token-price-wrap { display: flex; align-items: center; gap: 6px; }
        .wa-token-price { font-size: 14px; color: #8E94B2; }
        .wa-token-change { font-size: 14px; font-weight: 500; }
        .wa-token-change.up { color: #4ecca3; }
        .wa-token-change.down { color: #e94560; }
        .wa-asset-right { display: flex; flex-direction: column; align-items: flex-end; gap: 2px; }
        .wa-asset-balance { font-size: 16px; font-weight: 500; color: #EAECF0; }
        .wa-asset-value { font-size: 14px; color: #8E94B2; }
        .placeholder-text { text-align: center; padding: 30px; color: #a3adc9; }
    </style>

    <!-- 总资产卡片 -->
    <div class="glass-card">
        <div class="flex-row">
            <div>
                <div class="title-main">💰 总资产</div>
                <div class="desc">基于链上真实余额计算</div>
            </div>
            <div>
                <div class="stat-val" id="totalAssetValue">$--</div>
            </div>
        </div>
    </div>

    <!-- 资产列表 -->
    <div class="glass-card wallet-assets">
        <div class="wa-header">
            <span class="wa-tab">资产</span>
            <div class="wa-actions">
                <span>🔍</span>
                <span>+</span>
            </div>
        </div>
        <div class="wa-asset-list" id="waTokenList"></div>
    </div>

    <script>
    (function() {
        // 必须默认显示的代币
        var DEFAULT_TOKENS = ['BNB', 'USDT', 'BTCB', 'ETH'];
        
        // 其他可能持有的代币（将动态扫描余额）
        var OTHER_TOKENS = ['USDC', 'BUSD', 'MYK', 'WBNB', 'CAKE'];
        
        // 所有代币的配置信息
        var TOKEN_CONFIG = {
            'BNB':  { address: null, decimals: 18, iconColor: '#F0B90B', iconText: 'B', isNative: true },
            'USDT': { address: '0x55d398326f99059fF775485246999027B3197955', decimals: 18, iconColor: '#26a17b', iconText: 'USDT', isNative: false },
            'BTCB': { address: '0x7130d2A12B9BCbFAe4f2634d864A1Ee1Ce3Ead9c', decimals: 18, iconColor: '#f7931a', iconText: '₿', isNative: false },
            'ETH':  { address: '0x2170Ed0880ac9A755fd29B2688956BD959F933F8', decimals: 18, iconColor: '#627eea', iconText: '♦', isNative: false },
            'USDC': { address: '0x8AC76a51cc950d9822D68b83fE1Ad97B32Cd580d', decimals: 18, iconColor: '#2775ca', iconText: 'USDC', isNative: false },
            'BUSD': { address: '0xe9e7CEA3DedcA5984780Bafc599bD69ADd087D56', decimals: 18, iconColor: '#F0B90B', iconText: 'BUSD', isNative: false },
            'MYK':  { address: '0xc23CfEeC6D188D627C85106f682D9eb38d94192a', decimals: 18, iconColor: '#3f51b5', iconText: 'M', isNative: false },
            'WBNB': { address: '0xbb4CdB9CBd36B01bD1cBaEBF2De08d9173bc095c', decimals: 18, iconColor: '#F0B90B', iconText: 'WBNB', isNative: false },
            'CAKE': { address: '0x0E09FaBB73Bd3Ade0a17ECC321fD13a19e81cE82', decimals: 18, iconColor: '#D1884F', iconText: 'C', isNative: false }
        };

        var ERC20_ABI = [
            {"constant":true,"inputs":[{"name":"_owner","type":"address"}],"name":"balanceOf","outputs":[{"name":"balance","type":"uint256"}],"type":"function"},
            {"constant":true,"inputs":[],"name":"decimals","outputs":[{"name":"","type":"uint8"}],"type":"function"}
        ];

        var priceCache = {};

        function formatBalance(num, decimals) {
            if (num === 0) return '0';
            if (num < 0.001) return num.toFixed(6);
            return num.toLocaleString('en-US', { maximumFractionDigits: 4 });
        }

        function formatUSD(num) {
            if (num === 0) return '$0';
            if (num < 0.01) return '$' + num.toFixed(4);
            return '$' + num.toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
        }

        async function getTokenBalance(symbol) {
            if (!window.web3 || !window.currentAccount) return 0;
            var config = TOKEN_CONFIG[symbol];
            if (!config) return 0;
            var account = window.currentAccount;
            try {
                if (config.isNative) {
                    var balanceWei = await window.web3.eth.getBalance(account);
                    return parseFloat(window.web3.utils.fromWei(balanceWei, 'ether'));
                } else {
                    var contract = new window.web3.eth.Contract(ERC20_ABI, config.address);
                    var decimals = await contract.methods.decimals().call();
                    var bal = await contract.methods.balanceOf(account).call();
                    return parseFloat(window.web3.utils.fromWei(bal, 'ether')) / Math.pow(10, 18 - decimals);
                }
            } catch (e) {
                console.error('获取' + symbol + '余额失败:', e);
                return 0;
            }
        }

        async function fetchPrices() {
            try {
                var symbols = ['BNBUSDT', 'USDTUSDT', 'BTCBUSDT', 'ETHUSDT', 'USDCUSDT', 'BUSDUSDT', 'CAKEUSDT'];
                var responses = await Promise.all(symbols.map(s => 
                    fetch('https://api.binance.com/api/v3/ticker/price?symbol=' + s).then(r => r.json())
                ));
                responses.forEach(item => {
                    if (item && item.price) {
                        priceCache[item.symbol.replace('USDT', '')] = parseFloat(item.price);
                    }
                });
                priceCache['WBNB'] = priceCache['BNB'];
                // MYK 价格暂用固定值，也可以从 PancakeSwap 获取
                priceCache['MYK'] = 0.00647;
            } catch (e) {
                console.error('价格获取失败', e);
                // 回退价格
                priceCache = {
                    BNB: 540, USDT: 1, BTCB: 58000, ETH: 3200, USDC: 1, BUSD: 1,
                    MYK: 0.0065, WBNB: 540, CAKE: 2.5
                };
            }
        }

        function getTokenPrice(symbol) {
            return priceCache[symbol] || 0;
        }

        async function refreshAssets() {
            var container = document.getElementById('waTokenList');
            if (!container) return;
            
            if (!window.web3 || !window.currentAccount) {
                container.innerHTML = '<div class="placeholder-text">请先连接钱包</div>';
                document.getElementById('totalAssetValue').textContent = '$--';
                return;
            }

            await fetchPrices();

            // 收集所有要显示的代币及其余额
            var assetList = [];
            
            // 1. 先加入四个默认代币（始终显示）
            for (var i = 0; i < DEFAULT_TOKENS.length; i++) {
                var symbol = DEFAULT_TOKENS[i];
                var balance = await getTokenBalance(symbol);
                var price = getTokenPrice(symbol);
                var value = balance * price;
                assetList.push({ symbol: symbol, balance: balance, price: price, value: value });
            }
            
            // 2. 扫描其他代币，余额大于0的才加入
            for (var j = 0; j < OTHER_TOKENS.length; j++) {
                var otherSymbol = OTHER_TOKENS[j];
                var bal = await getTokenBalance(otherSymbol);
                if (bal > 0) {
                    var pr = getTokenPrice(otherSymbol);
                    var val = bal * pr;
                    assetList.push({ symbol: otherSymbol, balance: bal, price: pr, value: val });
                }
            }

            // 3. 按价值从高到低排序
            assetList.sort(function(a, b) { return b.value - a.value; });

            // 4. 渲染列表
            var totalValue = 0;
            var html = '';

            for (var k = 0; k < assetList.length; k++) {
                var asset = assetList[k];
                totalValue += asset.value;
                var config = TOKEN_CONFIG[asset.symbol];
                var bscBadge = (asset.symbol === 'USDT' || asset.symbol === 'USDC' || asset.symbol === 'BUSD') ? 
                    '<div class="wa-network-badge"><svg viewBox="0 0 24 24" width="14" height="14" fill="#152d44"><path d="M11.9999 0.410156L3.58325 5.52808V15.7639L11.9999 20.8819L20.4166 15.7639V5.52808L11.9999 0.410156Z" fill="#F3BA2F"/><path d="M9.39992 8.59995L12.0065 10.4167L14.6131 8.59995L12.0065 6.7832L9.39992 8.59995Z" fill="white"/></svg></div>' : '';

                html += 
                    '<div class="wa-asset-item">' +
                        '<div class="wa-asset-left">' +
                            '<div class="wa-token-icon-wrapper">' +
                                '<div class="wa-token-icon" style="background-color:' + config.iconColor + ';">' + config.iconText + '</div>' +
                                bscBadge +
                            '</div>' +
                            '<div class="wa-token-info">' +
                                '<div class="wa-token-name">' + asset.symbol + '</div>' +
                                '<div class="wa-token-price-wrap">' +
                                    '<span class="wa-token-price">' + formatUSD(asset.price) + '</span>' +
                                '</div>' +
                            '</div>' +
                        '</div>' +
                        '<div class="wa-asset-right">' +
                            '<div class="wa-asset-balance">' + formatBalance(asset.balance, config.decimals) + '</div>' +
                            '<div class="wa-asset-value">' + formatUSD(asset.value) + '</div>' +
                        '</div>' +
                    '</div>';
            }

            container.innerHTML = html || '<div class="placeholder-text">暂无资产</div>';
            document.getElementById('totalAssetValue').textContent = formatUSD(totalValue);
        }

        document.addEventListener('walletConnected', function() {
            refreshAssets();
        });
        document.addEventListener('walletDisconnected', function() {
            document.getElementById('totalAssetValue').textContent = '$--';
            var container = document.getElementById('waTokenList');
            if (container) container.innerHTML = '<div class="placeholder-text">请先连接钱包</div>';
        });

        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', function() {
                setTimeout(function() {
                    if (window.web3 && window.currentAccount) {
                        refreshAssets();
                    } else {
                        var container = document.getElementById('waTokenList');
                        if (container) container.innerHTML = '<div class="placeholder-text">请先连接钱包</div>';
                    }
                }, 500);
            });
        } else {
            setTimeout(function() {
                if (window.web3 && window.currentAccount) {
                    refreshAssets();
                } else {
                    var container = document.getElementById('waTokenList');
                    if (container) container.innerHTML = '<div class="placeholder-text">请先连接钱包</div>';
                }
            }, 500);
        }

        setInterval(function() {
            if (window.currentAccount) {
                refreshAssets();
            }
        }, 30000);
    })();
    </script>
</div>
