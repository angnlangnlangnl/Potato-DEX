<div id="page-assets" class="page-container">
    <style>
        .glass-card { 
            background: rgba(18,22,40,0.7); 
            backdrop-filter: blur(16px); 
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 16px; 
            padding: 16px; 
            margin-bottom: 15px; 
            color: #ccd6f0; 
        }
        .flex-row { display: flex; justify-content: space-between; align-items: center; }
        .title-main { color: #f0b90b; font-size: 18px; font-weight: bold; }
        .desc { color: #a3adc9; font-size: 13px; }
        .stat-val { font-size: 24px; font-weight: bold; color: #4ecca3; }
        .green-text { color: #4ecca3; }

        /* 钱包资产列表卡片 */
        .wallet-assets { margin-top: -5px; }
        .wa-header { display: flex; justify-content: space-between; align-items: center; padding: 0 0 12px 0; border-bottom: 1px solid rgba(255,255,255,0.08); }
        .wa-tabs { display: flex; gap: 20px; }
        .wa-tab { font-size: 15px; color: #8E94B2; cursor: pointer; position: relative; padding-bottom: 4px; }
        .wa-tab.active { color: #f0b90b; font-weight: 600; }
        .wa-tab.active::after { content: ''; position: absolute; left: 0; bottom: -12px; width: 100%; height: 2px; background: #f0b90b; }
        .wa-actions { display: flex; gap: 16px; color: #a3adc9; }
        .wa-actions span { font-size: 18px; cursor: pointer; }
        .wa-asset-list { display: flex; flex-direction: column; }
        .wa-asset-item {
            display: flex; align-items: center; justify-content: space-between;
            padding: 14px 0; border-bottom: 1px solid rgba(255,255,255,0.08);
            cursor: pointer; transition: background 0.2s;
        }
        .wa-asset-item:active { background: rgba(255,255,255,0.03); }
        .wa-asset-left { display: flex; align-items: center; gap: 12px; }
        .wa-token-icon-wrapper { position: relative; width: 40px; height: 40px; }
        .wa-token-icon {
            width: 100%; height: 100%; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-weight: bold; font-size: 16px; color: white;
        }
        .wa-network-badge {
            position: absolute; bottom: -2px; right: -2px;
            width: 16px; height: 16px; border-radius: 50%;
            border: 2px solid rgba(18,22,40,0.7);
            display: flex; align-items: center; justify-content: center; background: #fff;
        }
        .wa-token-info { display: flex; flex-direction: column; gap: 2px; }
        .wa-token-name { font-size: 16px; font-weight: 500; color: #EAECF0; }
        .wa-token-price-wrap { display: flex; align-items: center; gap: 6px; }
        .wa-token-price { font-size: 14px; color: #8E94B2; }
        .wa-token-change { font-size: 14px; font-weight: 500; }
        .wa-token-change.up { color: #4ecca3; }
        .wa-token-change.down { color: #e94560; }
        .wa-asset-right { display: flex; flex-direction: column; align-items: flex-end; gap: 2px; }
        .wa-asset-balance { font-size: 16px; font-weight: 500; color: #EAECF0; }
        .wa-asset-value { font-size: 14px; color: #8E94B2; }
    </style>

    <!-- 总资产卡片（独立显示） -->
    <div class="glass-card">
        <div class="flex-row">
            <div>
                <div class="title-main">💰 总资产</div>
                <div class="desc">资产分布4项美金价值汇总</div>
            </div>
            <div>
                <div class="stat-val" id="totalAssetValue">$--</div>
                <div class="desc green-text" style="text-align:right;" id="totalAssetChange">--</div>
            </div>
        </div>
    </div>

    <!-- 钱包资产列表卡片 -->
    <div class="glass-card wallet-assets">
        <div class="wa-header">
            <div class="wa-tabs">
                <span class="wa-tab active">DeFi</span>
                <span class="wa-tab">NFT</span>
            </div>
            <div class="wa-actions">
                <span>🔍</span>
                <span>+</span>
            </div>
        </div>
        <div class="wa-asset-list" id="waTokenList"></div>
    </div>

    <script>
    (function() {
        // 模拟代币数据（可替换为链上数据）
        var assets = [
            { symbol: 'BNB', price: 543.93, change: '-0.19%', balance: '0.001801', value: 0.97, isUp: false, iconColor: '#F0B90B', iconText: 'B', hasBscBadge: false },
            { symbol: 'MYK', price: 0.006470, change: '+8.82%', balance: '142,530.508', value: 922.96, isUp: true, iconColor: '#3f51b5', iconText: 'M', hasBscBadge: false },
            { symbol: 'USDC', price: 1.00, change: '-0.05%', balance: '0', value: 0, isUp: false, iconColor: '#2775ca', iconText: 'USDC', hasBscBadge: true },
            { symbol: 'USDT', price: 1.0000, change: '0.00%', balance: '0', value: 0, isUp: null, iconColor: '#26a17b', iconText: 'USDT', hasBscBadge: true },
            { symbol: 'BTCB', price: 58728.02, change: '+0.66%', balance: '0', value: 0, isUp: true, iconColor: '#f7931a', iconText: '₿', hasBscBadge: false },
            { symbol: 'ETH', price: 1575.12, change: '+0.74%', balance: '0', value: 0, isUp: true, iconColor: '#627eea', iconText: '♦', hasBscBadge: true }
        ];

        function formatMoney(num) {
            if (num === 0) return '$0';
            if (num < 0.01) return '$' + num.toFixed(4);
            return '$' + num.toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
        }

        function priceChangeClass(changeStr) {
            if (!changeStr) return '';
            if (changeStr.startsWith('+')) return 'up';
            if (changeStr.startsWith('-')) return 'down';
            return '';
        }

        function renderAssets() {
            var container = document.getElementById('waTokenList');
            if (!container) return;
            container.innerHTML = '';
            assets.forEach(function(asset) {
                var item = document.createElement('div');
                item.className = 'wa-asset-item';

                var bscBadgeSvg = asset.hasBscBadge ? 
                    '<div class="wa-network-badge"><svg viewBox="0 0 24 24" width="14" height="14" fill="#152d44"><path d="M11.9999 0.410156L3.58325 5.52808V15.7639L11.9999 20.8819L20.4166 15.7639V5.52808L11.9999 0.410156Z" fill="#F3BA2F"/><path d="M9.39992 8.59995L12.0065 10.4167L14.6131 8.59995L12.0065 6.7832L9.39992 8.59995Z" fill="white"/></svg></div>' : '';

                item.innerHTML =
                    '<div class="wa-asset-left">' +
                        '<div class="wa-token-icon-wrapper"><div class="wa-token-icon" style="background-color:' + asset.iconColor + ';">' + asset.iconText + '</div>' + bscBadgeSvg + '</div>' +
                        '<div class="wa-token-info"><div class="wa-token-name">' + asset.symbol + '</div><div class="wa-token-price-wrap"><span class="wa-token-price">' + formatMoney(asset.price) + '</span><span class="wa-token-change ' + priceChangeClass(asset.change) + '">' + asset.change + '</span></div></div>' +
                    '</div>' +
                    '<div class="wa-asset-right"><div class="wa-asset-balance">' + asset.balance + '</div><div class="wa-asset-value">' + formatMoney(asset.value) + '</div></div>';
                container.appendChild(item);
            });
        }

        if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', renderAssets);
        else renderAssets();
    })();
    </script>
</div>
